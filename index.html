<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>星PVP · 论剑问道 v3.0</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#b8860b;--pri2:#c9a050;--prid:rgba(184,134,11,.12);
  --t1:#9a7208;--t2:#c0442c;--t3:#2d7a4e;
  --bg:#f0ebe0;--bg2:#e8e0d0;--card:#fffdf7;--card2:#faf5ec;
  --text:#3d3226;--text2:#8a7a65;--border:rgba(0,0,0,.07);
  --shadow:0 2px 16px rgba(0,0,0,.07);
  --font:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
  --font2:"Noto Serif SC","STSong","SimSun",serif;
  --gold-glow:0 0 16px rgba(184,134,11,.2),0 0 40px rgba(184,134,11,.06);
  --card-hover:0 6px 20px rgba(0,0,0,.1),0 0 0 1px rgba(184,134,11,.12);
  --red:#b22222;--red2:#d43030;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;overflow-x:hidden}

/* ===== AMBIENT BACKGROUND ===== */
.ambient-bg{position:fixed;inset:0;z-index:-3;pointer-events:none}
.ambient-bg .bg-gradient{position:absolute;inset:0;background:
  radial-gradient(ellipse at 20% 50%,rgba(184,134,11,.06) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 20%,rgba(200,120,60,.05) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 80%,rgba(45,122,78,.04) 0%,transparent 50%),
  radial-gradient(ellipse at 60% 40%,rgba(180,100,80,.03) 0%,transparent 60%);
  animation:bgPulse 12s ease-in-out infinite}
@keyframes bgPulse{0%,100%{opacity:.8}50%{opacity:1}}

/* ===== SCENE BG ===== */
.scene{position:fixed;inset:0;z-index:-2;pointer-events:none}
.scene svg.mountains{position:absolute;bottom:0;width:100%;height:55%}
.scene .mist{position:absolute;bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(to top,rgba(240,235,224,.95) 0%,transparent 100%)}
.scene .moon{position:absolute;top:6%;right:12%;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,215,150,.6),rgba(240,190,120,.2) 50%,transparent 70%);
  box-shadow:0 0 60px rgba(240,180,100,.2),0 0 120px rgba(240,180,100,.08);
  animation:moonGlow 6s ease-in-out infinite}
@keyframes moonGlow{0%,100%{box-shadow:0 0 60px rgba(240,180,100,.2),0 0 120px rgba(240,180,100,.08)}50%{box-shadow:0 0 100px rgba(240,180,100,.3),0 0 160px rgba(240,180,100,.12)}}

/* ===== FIREFLIES / PARTICLES ===== */
.particles{position:fixed;inset:0;z-index:-1;pointer-events:none}
.particle{position:absolute;border-radius:50%;
  animation:floatUp 8s infinite ease-in;opacity:0}
.particle.gold{background:var(--pri);box-shadow:0 0 6px var(--pri),0 0 12px rgba(201,160,80,.4)}
.particle.warm{background:#e8a860;box-shadow:0 0 4px #e8a860}
.particle.jade{background:#7ec89a;box-shadow:0 0 4px #7ec89a}
.particle.large{width:3px;height:3px}
.particle.medium{width:2px;height:2px}
.particle.small{width:1.5px;height:1.5px}
@keyframes floatUp{0%{transform:translateY(100vh) translateX(0) scale(0);opacity:0}
  15%{opacity:.9}85%{opacity:.15}
  100%{transform:translateY(-10vh) translateX(var(--drift)) scale(1.8);opacity:0}}

/* ===== PETALS (cherry blossom style) ===== */
.petals{position:fixed;inset:0;z-index:-1;pointer-events:none}
.petal{position:absolute;width:8px;height:8px;background:rgba(220,160,140,.4);
  border-radius:50% 0 50% 0;animation:petalFall 12s infinite linear;opacity:0}
.petal:nth-child(odd){background:rgba(240,180,160,.35);border-radius:0 50% 0 50%}
@keyframes petalFall{0%{transform:translateY(-5vh) rotate(0deg) translateX(0);opacity:0}
  5%{opacity:.6}90%{opacity:.2}
  100%{transform:translateY(105vh) rotate(720deg) translateX(var(--px));opacity:0}}

/* ===== DRIFTING CLOUDS ===== */
.clouds{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.cloud{position:absolute;background:rgba(0,0,0,.02);border-radius:50%;filter:blur(25px);animation:drift 40s infinite linear}
.cloud:nth-child(1){width:350px;height:70px;top:12%;left:-350px;animation-duration:45s}
.cloud:nth-child(2){width:450px;height:90px;top:22%;left:-450px;animation-duration:52s;animation-delay:-15s}
.cloud:nth-child(3){width:280px;height:55px;top:32%;left:-280px;animation-duration:38s;animation-delay:-25s}
.cloud:nth-child(4){width:380px;height:65px;top:18%;left:-380px;animation-duration:48s;animation-delay:-8s}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 800px))}}

/* ===== SWORDSMAN SILHOUETTE ===== */
.swordsman{position:fixed;bottom:6%;right:3%;z-index:-1;pointer-events:none;
  opacity:.18;width:220px;height:360px;animation:sway 8s ease-in-out infinite;transform-origin:bottom center}
@keyframes sway{0%,100%{transform:rotate(-2deg) translateY(0)}25%{transform:rotate(0deg) translateY(-4px)}50%{transform:rotate(2deg) translateY(0)}75%{transform:rotate(0deg) translateY(4px)}}
.ink-splash{position:fixed;bottom:-60px;right:-40px;z-index:-1;pointer-events:none;
  width:500px;height:250px;background:radial-gradient(ellipse at center,rgba(184,134,11,.08),transparent 70%);border-radius:50%}

/* ===== LIGHT RAYS (subtle) ===== */
.light-rays{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden}
.ray{position:absolute;top:-20%;width:1px;height:140%;
  background:linear-gradient(to bottom,transparent,rgba(201,160,80,.04) 40%,rgba(201,160,80,.02) 60%,transparent);
  animation:raySweep 20s infinite linear;opacity:.5}
.ray:nth-child(1){left:20%;animation-delay:0s}
.ray:nth-child(2){left:40%;animation-delay:-7s}
.ray:nth-child(3){left:60%;animation-delay:-14s}
@keyframes raySweep{0%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}100%{transform:rotate(-5deg)}}

/* ===== LOGIN PAGE ===== */
.login-wrap{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-bg-anim{position:absolute;inset:0;overflow:hidden;pointer-events:none}
/* 燕云十六声登录页壁纸 */
.login-bg-anim::before{content:'';position:absolute;inset:0;
  background-size:cover;background-position:center;
  animation:loginBgCycle 18s infinite steps(1),loginBgBreath 6s ease-in-out infinite}
@keyframes loginBgCycle{
  0%{background-image:url('https://pic.qianye88.com/pic/b369c418c9a2d30566843c76e4d4306e.jpg')}
  33%{background-image:url('https://pic.qianye88.com/pic/b53441e789f8638563760867b75f2be4.jpg')}
  66%{background-image:url('https://pic.qianye88.com/pic/1bba43992c79606d074592381b5e95a6.jpg')}
  100%{background-image:url('https://pic.qianye88.com/pic/b369c418c9a2d30566843c76e4d4306e.jpg')}
}
@keyframes loginBgBreath{0%,100%{opacity:.16}50%{opacity:.25}}
.login-bg-anim .circle{position:absolute;border-radius:50%;border:1px solid rgba(201,160,80,.06);
  animation:loginCircle 20s infinite linear}
.login-bg-anim .circle:nth-child(1){width:600px;height:600px;top:-200px;left:-100px;animation-duration:25s}
.login-bg-anim .circle:nth-child(2){width:500px;height:500px;bottom:-150px;right:-80px;animation-duration:30s;animation-delay:-8s}
.login-bg-anim .circle:nth-child(3){width:400px;height:400px;top:40%;left:50%;animation-duration:22s;animation-delay:-15s;
  border-color:rgba(180,120,60,.04)}
@keyframes loginCircle{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}

.login-card{background:var(--card);border:1px solid rgba(201,160,80,.12);border-radius:20px;
  box-shadow:0 8px 48px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.02);
  padding:48px 40px 36px;width:100%;max-width:430px;
  animation:fadeSlideIn .8s cubic-bezier(.16,1,.3,1);
  position:relative;z-index:2;
  transition:box-shadow .4s,transform .4s}
.login-card:hover{box-shadow:0 12px 56px rgba(0,0,0,.7),0 0 40px rgba(201,160,80,.06),inset 0 1px 0 rgba(255,255,255,.02);
  transform:translateY(-2px)}
.login-card::before{content:'';position:absolute;top:-1px;left:30px;right:30px;height:1px;
  background:linear-gradient(to right,transparent,rgba(201,160,80,.3),transparent);
  animation:loginLine 3s ease-in-out infinite}
@keyframes loginLine{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.login-card .emblem{text-align:center;margin-bottom:24px}
.login-card .emblem .sword-icon{font-size:3.2em;filter:drop-shadow(0 0 20px rgba(201,160,80,.4));
  animation:swordFloat 3s ease-in-out infinite;display:inline-block}
@keyframes swordFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.login-card .emblem h1{font-family:var(--font2);font-size:1.7em;font-weight:400;letter-spacing:6px;color:var(--pri);margin-top:4px;
  text-shadow:0 0 30px rgba(201,160,80,.3)}
.login-card .emblem p{font-size:.72em;color:var(--text2);letter-spacing:3px;margin-top:4px}
.login-card .tabs{display:flex;background:rgba(255,255,255,.02);border-radius:12px;padding:3px;margin-bottom:24px;
  transition:background .3s}
.login-card .tabs button{flex:1;padding:11px;border:none;background:none;color:var(--text2);font-size:.85em;
  cursor:pointer;border-radius:10px;transition:all .3s;font-family:var(--font);letter-spacing:1px;position:relative}
.login-card .tabs button.on{background:var(--prid);color:var(--pri);
  box-shadow:0 0 12px rgba(201,160,80,.08)}
.login-card .tabs button:hover:not(.on){color:#c0b090}

/* ===== TIER TABS (赛程管理) ===== */
.tier-tabs{display:inline-flex;gap:6px;background:var(--card2);padding:4px;border-radius:12px;border:1px solid var(--border)}
.tier-tab{padding:9px 18px;border:none;background:transparent;border-radius:9px;font-size:.82em;font-weight:500;
  cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);font-family:var(--font);letter-spacing:.8px;
  color:var(--text2);position:relative}
.tier-tab:hover{color:var(--text);background:rgba(255,255,255,.04)}
.tier-tab.on{color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.2);transform:translateY(-1px)}
.tier-tab.tier-t1.on{background:linear-gradient(135deg,#b8860b,#c9a050)}
.tier-tab.tier-t2.on{background:linear-gradient(135deg,#c0442c,#d4703a)}
.tier-tab.tier-t3.on{background:linear-gradient(135deg,#2d7a4e,#4aad6e)}
.tier-tab.tier-team.on{background:linear-gradient(135deg,#4a5d7a,#6a8db5)}
.tier-tab:not(.on).tier-t1:hover{border-color:#c9a050;color:#c9a050}
.tier-tab:not(.on).tier-t2:hover{border-color:#d4703a;color:#d4703a}
.tier-tab:not(.on).tier-t3:hover{border-color:#4aad6e;color:#4aad6e}
.tier-tab:not(.on).tier-team:hover{border-color:#6a8db5;color:#6a8db5}

/* ===== SEAL ===== */
.seal{position:absolute;bottom:-10px;right:-10px;width:56px;height:56px;
  border:2px solid rgba(180,60,40,.6);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  transform:rotate(8deg);color:rgba(180,60,40,.5);
  font-family:var(--font2);font-size:11px;font-weight:700;
  line-height:1.2;text-align:center;letter-spacing:1px;
  pointer-events:none;user-select:none;
  animation:sealPulse 4s ease-in-out infinite}
@keyframes sealPulse{0%,100%{border-color:rgba(180,60,40,.6);color:rgba(180,60,40,.5)}50%{border-color:rgba(200,80,50,.8);color:rgba(200,80,50,.7)}}

/* ===== FORMS ===== */
input,select,textarea{font-family:inherit;font-size:.88em}
input,select{padding:11px 13px;border:1px solid var(--border);border-radius:8px;
  background:rgba(255,255,255,.85);color:var(--text);width:100%;transition:all .3s}
input:focus,select:focus{outline:none;border-color:var(--pri);
  box-shadow:0 0 0 3px rgba(184,134,11,.1),0 0 12px rgba(184,134,11,.08)}
::placeholder{color:rgba(138,128,112,.4)}
.form-g{margin-bottom:14px}.form-g label{display:block;margin-bottom:5px;font-size:.78em;
  color:var(--text2);font-weight:500;letter-spacing:.5px}
.form-r{display:flex;gap:12px}.form-r>*{flex:1}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 18px;border:none;border-radius:8px;font-weight:500;
  cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);
  font-size:.85em;letter-spacing:.3px;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--pri),#b8903a);color:#1a1a10}
.btn-p:hover{box-shadow:0 6px 24px rgba(201,160,80,.4);transform:translateY(-2px)}
.btn-p::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.1),transparent);
  transform:translateX(-100%);transition:transform .6s}
.btn-p:hover::after{transform:translateX(100%)}
.btn-s{background:var(--t3);color:#fff}.btn-s:hover{box-shadow:0 4px 16px rgba(90,158,111,.3);transform:translateY(-1px)}
.btn-e{background:rgba(192,57,43,.8);color:#fff}.btn-e:hover{background:rgba(220,70,50,.9);transform:translateY(-1px)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-o:hover{background:rgba(255,255,255,.04);border-color:rgba(201,160,80,.2);transform:translateY(-1px)}
.btn-g{background:rgba(255,255,255,.03);color:var(--text2)}
.btn-g:hover{background:rgba(255,255,255,.06);color:var(--text)}
.btn-sm{padding:6px 14px;font-size:.78em}.btn-xs{padding:4px 10px;font-size:.7em;border-radius:6px}
.btn-glow{animation:btnGlow 2s ease-in-out infinite}
@keyframes btnGlow{0%,100%{box-shadow:0 0 8px rgba(201,160,80,.2)}50%{box-shadow:0 0 20px rgba(201,160,80,.4)}}

/* ===== BADGES ===== */
.badge{display:inline-block;padding:3px 12px;border-radius:99px;font-size:.7em;font-weight:600;letter-spacing:.5px;
  transition:all .3s}
.bt1{background:rgba(201,160,80,.1);color:var(--t1);border:1px solid rgba(201,160,80,.18)}
.bt2{background:rgba(192,120,64,.1);color:var(--t2);border:1px solid rgba(192,120,64,.18)}
.bt3{background:rgba(90,158,111,.1);color:var(--t3);border:1px solid rgba(90,158,111,.18)}
.bn{background:rgba(255,255,255,.03);color:var(--text2)}
.btm{background:rgba(90,158,111,.08);color:var(--t3);border:1px solid rgba(90,158,111,.15)}

/* ===== APP LAYOUT ===== */
.app{display:none;min-height:100vh;position:relative;z-index:1}
.app.on{display:flex}
.sidebar{width:230px;background:rgba(255,253,245,.96);border-right:1px solid rgba(184,134,11,.1);
  position:fixed;top:0;left:0;bottom:0;z-index:10;display:flex;flex-direction:column;
  backdrop-filter:blur(12px);transition:all .3s}
.sidebar .s-hd{padding:24px 20px 18px;border-bottom:1px solid rgba(184,134,11,.12);
  font-family:var(--font2);font-size:1em;letter-spacing:3px;color:var(--pri);text-align:center}
.sidebar .s-hd .sub{font-size:.6em;color:var(--text2);letter-spacing:2px;display:block;margin-top:2px}
.sidebar nav{flex:1;padding:10px 0}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 22px;color:var(--text2);
  font-size:.8em;text-decoration:none;transition:all .25s;border-left:3px solid transparent;
  letter-spacing:.5px;position:relative}
.sidebar nav a::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(to right,rgba(184,134,11,.08),transparent);transition:width .3s}
.sidebar nav a:hover,.sidebar nav a.on{color:var(--pri);background:var(--prid);border-left-color:var(--pri)}
.sidebar nav a:hover::before,.sidebar nav a.on::before{width:100%}
.sidebar .s-art{height:110px;margin:6px 10px;border-radius:8px;
  background-size:cover;background-position:center;
  animation:sArtCycle 18s infinite steps(1);
  opacity:.3;border:1px solid rgba(184,134,11,.15);
  transition:opacity .5s}
@keyframes sArtCycle{
  0%{background-image:url('https://pic.qianye88.com/pic/1bba43992c79606d074592381b5e95a6.jpg')}
  33%{background-image:url('https://pic.qianye88.com/pic/b369c418c9a2d30566843c76e4d4306e.jpg')}
  66%{background-image:url('https://pic.qianye88.com/pic/b53441e789f8638563760867b75f2be4.jpg')}
  100%{background-image:url('https://pic.qianye88.com/pic/1bba43992c79606d074592381b5e95a6.jpg')}
}
.sidebar .s-art:hover{opacity:.5}

/* 十六州风云色条 */
.color-strip{position:fixed;bottom:0;left:0;right:0;height:3px;z-index:20;pointer-events:none;
  background:linear-gradient(to right,
    #8b1a1a,#c41e3a,#d4603b,#c9a050,#b8860b,
    #6b8e23,#2d7a4e,#3b7a8a,#4a5d7a,#483c52,
    #5c3a2e,#7a5c4a,#8a7040,#6a5540,#4a3a2a,#3a2a1a
  );opacity:.7}
.sidebar .s-ft{border-top:1px solid rgba(184,134,11,.1);padding:14px 20px;
  display:flex;justify-content:space-between;align-items:center;font-size:.75em}
.main{margin-left:230px;flex:1;padding:28px 32px;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tb{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.tb h2{font-family:var(--font2);font-size:1.2em;font-weight:400;letter-spacing:2px}

/* ===== CARDS ===== */
.card{background:var(--card);border:1px solid rgba(255,255,255,.03);border-radius:12px;
  padding:22px;margin-bottom:16px;box-shadow:var(--shadow);position:relative;
  transition:all .4s cubic-bezier(.4,0,.2,1)}
.card:hover{border-color:rgba(201,160,80,.06);box-shadow:var(--card-hover)}
.card h2{font-size:.95em;margin-bottom:14px;font-weight:500;letter-spacing:1px}
.card h3{font-size:.85em;margin:14px 0 8px;font-weight:500;color:var(--text2)}
.card .card-trim{position:absolute;top:0;left:16px;right:16px;height:1px;
  background:linear-gradient(to right,transparent,rgba(201,160,80,.15),transparent)}
.card.animate-in{animation:cardSlideUp .5s cubic-bezier(.16,1,.3,1) both}
@keyframes cardSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8em}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.03)}
th{color:var(--text2);font-weight:500;font-size:.7em;letter-spacing:1px;text-transform:uppercase}
tr{transition:all .2s}
tr:hover{background:rgba(255,255,255,.015)}
tr.q{background:rgba(39,174,96,.04)}tr.q td:first-child::before{content:'✓ ';color:var(--t3);font-size:.8em}
.info-box{background:rgba(201,160,80,.03);border-left:2px solid var(--pri);
  padding:12px 16px;border-radius:0 8px 8px 0;font-size:.78em;color:var(--text2);
  margin-bottom:16px;line-height:2;animation:infoGlow 4s ease-in-out infinite}
@keyframes infoGlow{0%,100%{border-left-color:var(--pri)}50%{border-left-color:rgba(201,160,80,.4)}}

/* ===== STATS ===== */
.stat-r{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid rgba(255,255,255,.02);border-radius:10px;
  padding:16px;text-align:center;box-shadow:var(--shadow);
  transition:all .4s;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--pri),transparent);
  opacity:0;transition:opacity .4s}
.stat:hover{transform:translateY(-3px);box-shadow:var(--card-hover)}
.stat:hover::after{opacity:.5}
.stat .v{font-size:1.7em;font-weight:700;transition:all .3s}
.stat .l{font-size:.7em;color:var(--text2);margin-top:3px;letter-spacing:.5px}

/* ===== GROUP CARDS ===== */
.g-grid{display:grid;grid-template-columns:1fr;gap:16px}
.g-card{background:var(--card2);border:1px solid rgba(255,255,255,.02);border-radius:10px;
  overflow:hidden;box-shadow:var(--shadow);max-width:100%;
  transition:all .4s cubic-bezier(.4,0,.2,1)}
.g-card:hover{transform:translateY(-2px);box-shadow:var(--card-hover)}
.g-card .g-hd{padding:12px 16px;font-weight:500;font-size:.82em;letter-spacing:1px;

<script>
// ==================== DATA ====================
// ==================== SOUND ENGINE ====================
let _ac=null;
function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac}
function sfx(freq,type,dur,vol,delay){
  try{const a=ac();const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,a.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
  o.connect(g);g.connect(a.destination);o.start(a.currentTime+delay);o.stop(a.currentTime+delay+dur)}catch(e){}
}
function sClick(){sfx(1200,'sine',.06,.04,0);sfx(1600,'sine',.04,.02,.03)}
function sSword(){sfx(180,'sawtooth',.12,.05,0);sfx(600,'sine',.08,.04,.04);sfx(900,'sine',.06,.03,.06)}
function sLock(){sfx(300,'triangle',.15,.06,0);sfx(500,'triangle',.12,.05,.08)}
function sPage(){sfx(800,'sine',.05,.03,0);sfx(1000,'sine',.04,.02,.04)}
function sError(){sfx(150,'square',.2,.06,0);sfx(100,'square',.2,.06,.06)}

// ==================== CLOUD SYNC (Firebase) ====================
let _fb=null,_fbReady=false,_fbSyncing=false;
const FB_KEYS=['users','session','players','m_t1','m_t2','m_t3','tmg','tmk','teams'];

function fbInit(){
  const cfg=ld('syncConfig');
  if(!cfg||!cfg.apiKey){console.log('Firebase: 未配置');return}
  try{
    firebase.initializeApp(cfg);
    _fb=firebase.database();_fbReady=true;
    _fb.ref('.info/connected').on('value',snap=>{
      const el=document.getElementById('syncDot');
      if(el){el.style.background=snap.val()?'#2ecc71':'#e74c3c';el.title=snap.val()?'已连接云端':'未连接'}
    });
    // 监听远程变化
    FB_KEYS.forEach(k=>{
      _fb.ref('by5_'+k).on('value',snap=>{
        if(_fbSyncing)return; // 本地写入中，跳过
        const v=snap.val();
        if(v!==null){localStorage.setItem('by5_'+k,JSON.stringify(v));D=loadAll();refreshUI()}
      });
    });
    console.log('Firebase: 已连接');
  }catch(e){console.error('Firebase init error:',e)}
}
function fbSave(k,v){
  if(!_fbReady)return;
  _fbSyncing=true;
  _fb.ref('by5_'+k).set(v).then(()=>{_fbSyncing=false}).catch(()=>{_fbSyncing=false});
}
function fbSaveAll(d){
  if(!_fbReady)return;
  FB_KEYS.forEach(k=>{const v=d[k]||(k.startsWith('m_')||k==='tmg'||k==='tmk'?d.matches?.[k.replace('m_','')]:d.teamM?.[k==='tmg'?'groups':'knockout']);if(v!==undefined)fbSave(k,v)});
}

// 配置同步服务器
function setupSync(){
  const cfg=ld('syncConfig')||{};
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal" style="max-width:600px"><h3>☁️ 配置云端同步</h3>
    <div class="info-box" style="font-size:.75em;line-height:1.8">
      <b>步骤：</b><br>
      1. 打开 <a href="https://console.firebase.google.com" target="_blank" style="color:var(--pri)">console.firebase.google.com</a> 创建免费项目<br>
      2. 左侧 Build → <b>Realtime Database</b> → 创建数据库（选"测试模式"）<br>
      3. 项目设置 → 常规 → 您的应用 → 网页应用 → 复制配置信息<br>
      4. 粘贴到下方各字段中，点保存<br>
      <span style="color:var(--red2)">⚠️ 所有设备输入<b>相同的配置</b>即可实时同步数据！</span>
    </div>
    <div class="form-r"><div class="form-g"><label>apiKey</label><input id="fbApiKey" value="${esc(cfg.apiKey||'')}"></div>
    <div class="form-g"><label>authDomain</label><input id="fbAuthDomain" value="${esc(cfg.authDomain||'')}"></div></div>

const K='by5_';
function ld(k){try{const v5=localStorage.getItem(K+k);if(v5!==null)return JSON.parse(v5);const v4=localStorage.getItem('by4_'+k);if(v4!==null){const d=JSON.parse(v4);sv(k,d);return d}return null}catch(e){return null}}
function sv(k,v){localStorage.setItem(K+k,JSON.stringify(v))}

function rGroups(){
  const indiv=D.players.filter(p=>p.event!=='team');
  let h=`<div class="tb"><h2>⚖️ 分组编排</h2></div>
    <div class="card animate-in"><div class="card-trim"></div>
    <div class="info-box">按 <b>论剑分+胜率</b> 排名分三组。生成赛程时会<b>根据各组人数自适应</b>调整赛制。<br>
    <span class="badge bt1">天罡组</span> 前1/3 <span class="badge bt2">地煞组</span> 中1/3 <span class="badge bt3">人杰组</span> 后1/3<br>
    <span style="font-size:.72em;color:var(--text2)">管理员可手动调整任何人的分组，及组内A/B/C/D小组分配</span></div>
    <button class="btn btn-p" onclick="autoThreeTier()">🔄 自动三组编排</button>
    <button class="btn btn-s" onclick="genAllSchedules()" style="margin-left:6px">📅 自适应生成赛程</button>
    <button class="btn btn-o" onclick="showAP('schedule')" style="margin-left:6px">→ 去赛程管理</button>
    <button class="btn btn-e" onclick="generateTestData()" style="margin-left:6px" title="一键生成20名测试选手+自动编排+自动赛程">🧪 生成测试数据</button></div>`;
  ['t1','t2','t3'].forEach(tier=>{
    const ms=indiv.filter(p=>p.group===tier).sort((a,b)=>b.score-a.score||b.winrate-a.winrate);
    if(ms.length===0)return;
    h+=`<div class="g-card ${tier}"><div class="g-hd">${TIERS[tier]} · ${ms.length} 人 <span style="font-size:.7em;color:var(--text2)">论剑分排位</span></div>
      <table><thead><tr><th>#</th><th>侠客名</th><th>论剑分</th><th>胜率</th><th>组内小组</th><th>调整</th></tr></thead><tbody>`;
    ms.forEach((p,i)=>{
      const sg=getSubGroup(tier,p.id);
      h+=`<tr><td>${i+1}</td><td>${esc(p.name)}</td><td>${p.score}</td><td>${p.winrate}%</td>
        <td><span class="badge bn">${sg||'未分配'}</span></td>
        <td><select onchange="chgGroup('${p.id}',this.value)" style="width:auto;padding:4px 5px;font-size:.68em">
        <option value="t1" ${p.group==='t1'?'selected':''}>天罡</option>
        <option value="t2" ${p.group==='t2'?'selected':''}>地煞</option>
        <option value="t3" ${p.group==='t3'?'selected':''}>人杰</option>
        <option value="">移除</option></select></td></tr>`;
    });
    h+='</tbody></table></div>';
  });
  const un=indiv.filter(p=>!p.group);
  if(un.length>0){
    h+=`<div class="g-card"><div class="g-hd">待编排 · ${un.length} 人</div>
      <table><thead><tr><th>侠客名</th><th>论剑分</th><th>胜率</th></tr></thead><tbody>`;
    un.forEach(p=>h+=`<tr><td>${esc(p.name)}</td><td>${p.score}</td><td>${p.winrate}%</td></tr>`);
    h+='</tbody></table></div>';
  }
  return h;
}
function getSubGroup(tier,pid){const m=D.matches[tier];if(!m||!m.groups)return null;for(const[gn,g]of Object.entries(m.groups)){if(g.players.includes(pid))return gn+'组';}return null;}
function autoThreeTier(){
  const indiv=D.players.filter(p=>p.event!=='team');
  if(indiv.length<3){toast('至少需要3名选手');return}
  const sorted=[...indiv].sort((a,b)=>b.score-a.score||b.winrate-a.winrate);
  const n=sorted.length,s1=Math.floor(n/3),s2=Math.floor(n*2/3);
  sorted.forEach((p,i)=>{if(i<s1)p.group='t1';else if(i<s2)p.group='t2';else p.group='t3';});
  saveAll(D);showAP('groups');
  toast(`已编排：天罡${s1}·地煞${s2-s1}·人杰${n-s2}`);
}

// -- 自适应赛程生成 --
function adaptiveSchedule(players){
  const n=players.length;const arr=[...players].sort(()=>Math.random()-.5);
  if(n<3)return null;
  let numGroups,advPerGroup,knockout;
  // 智能赛制：根据人数自适应
  if(n<=4){numGroups=1;advPerGroup=1;knockout='direct';}         // ≤4人: 1组循环,冠军直出
  else if(n<=6){numGroups=1;advPerGroup=2;knockout='semifinal';}  // 5-6人: 1组前2→决赛
  else if(n<=8){numGroups=2;advPerGroup=1;knockout='semifinal';}  // 7-8人: 2组各第1→决赛
  else if(n<=11){numGroups=4;advPerGroup=1;knockout='semifinal';} // 9-11人: 4组各第1→半决赛(4强)
  else if(n<=13){numGroups=2;advPerGroup=2;knockout='semifinal';} // 12-13人: 2组各前2→半决赛(4强)
  else{numGroups=4;advPerGroup=2;knockout='quarter';}             // ≥14人: 4组各前2→¼决赛(8强)
  numGroups=Math.min(numGroups,n);if(numGroups<1)numGroups=1;

  const groups={};for(let i=0;i<numGroups;i++)groups[String.fromCharCode(65+i)]={players:[],matches:[]};
  arr.forEach((p,i)=>groups[String.fromCharCode(65+(i%numGroups))].players.push(p.id));
  const today=new Date();const dates=[];const hours=['14:00','15:30','16:00','17:30','19:00','20:00','20:30'];
  for(let i=0;i<8;i++){const d=new Date(today);d.setDate(d.getDate()+i);dates.push((d.getMonth()+1)+'月'+d.getDate()+'日 '+hours[i%hours.length]);}

  Object.values(groups).forEach((g,gi)=>{
    const ids=g.players;
    for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++)
      g.matches.push({id:'g_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
        p1:ids[i],p2:ids[j],s1:null,s2:null,winner:null,bo:3,date:dates[gi]||dates[0]});
  });

  if(knockout==='direct'){
    knockout=[];
  }else if(knockout==='semifinal'){
    // semis needed when >1 group OR when single group sends top 2 to a final
    const needSemis=numGroups>2||(numGroups===2&&advPerGroup===2);
    if(!needSemis&&numGroups<=2&&advPerGroup===1){
      // 2 groups → winners play final directly
      knockout=[
        {id:'ko_fin',r:'final',bo:7,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-1],label:'决赛'},
      ];
    }else{
      // 4 groups OR 2 groups top2 → semifinals + final + 3rd place
      knockout=[
        {id:'ko_sf1',r:'semifinal',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-2],label:'半决赛1'},
        {id:'ko_sf2',r:'semifinal',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-2],label:'半决赛2'},
        {id:'ko_3rd',r:'third',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-1],label:'季军赛'},
        {id:'ko_fin',r:'final',bo:7,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-1],label:'决赛'},
      ];
    }
  }else{// quarter: 4组各前2→¼决赛(8强)
    knockout=[
      {id:'ko_qf1',r:'quarter',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-4],label:'¼决赛1'},
      {id:'ko_qf2',r:'quarter',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-4],label:'¼决赛2'},
      {id:'ko_qf3',r:'quarter',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-4],label:'¼决赛3'},
      {id:'ko_qf4',r:'quarter',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-4],label:'¼决赛4'},
      {id:'ko_sf1',r:'semifinal',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-2],label:'半决赛1'},
      {id:'ko_sf2',r:'semifinal',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-2],label:'半决赛2'},
      {id:'ko_3rd',r:'third',bo:5,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-1],label:'季军赛'},
      {id:'ko_fin',r:'final',bo:7,p1:null,p2:null,s1:null,s2:null,winner:null,date:dates[dates.length-1],label:'决赛'},
    ];
  }
  return{groups,knockout,format:knockout,numGroups,advPerGroup,groupConfirmed:false};
}

function genAllSchedules(){
  let ok=0;
  ['t1','t2','t3'].forEach(tier=>{
    const ps=D.players.filter(p=>p.group===tier&&p.event!=='team');
    if(ps.length>=3){const r=adaptiveSchedule(ps);if(r){D.matches[tier]=r;ok++}}
  });
  if(ok===0){toast('每组至少需要3人');return}
  saveAll(D);showAP('schedule');toast(`${ok}组赛程已自适应生成`);
}

    h+=`</tbody></table>`;

function confirmGroupStage(tier){
  const m=D.matches[tier];if(!m||!m.groups){toast('无赛程数据');return}
  m.groupConfirmed=true;
  advKnock(tier); // populate knockout
  saveAll(D);showAP('schedule');toast('✅ 小组赛已锁定，淘汰赛对阵已生成');
}
function unlockGroupStage(tier){
  if(!confirm('解锁后将清空淘汰赛比分和晋级信息，确定吗？'))return;
  const m=D.matches[tier];if(!m)return;
  m.groupConfirmed=false;
  // Reset all knockout matches
  m.knockout.forEach(k=>{k.p1=null;k.p2=null;k.s1=null;k.s2=null;k.winner=null});
  saveAll(D);showAP('schedule');toast('🔓 已解锁');
}
function forceAdvanceKnockout(tier){
  const m=D.matches[tier];if(!m||!m.groups)return;
  advKnock(tier);saveAll(D);showAP('schedule');toast('🔄 淘汰赛已重新推进');
}
function fmtFormat(m){if(!m)return'未知';const f=m.format;const ap=m.advPerGroup||(f==='quarter'?2:1);if(f==='direct')return'单组循环，第1名夺冠';if(f==='semifinal')return`${m.numGroups||'?'}组→各组前${ap}晋级→${ap*m.numGroups}强→半决赛`;return`${m.numGroups||4}组→各组前${ap}晋级→${ap*m.numGroups}强→¼决赛→半决赛`;}
function getAdvCount(m){if(!m)return 1;const ap=m.advPerGroup||(m.format==='quarter'?2:1);return ap;}
function setGroupDate(tier,gn,date){const m=D.matches[tier];if(!m||!m.groups)return;const g=m.groups[gn];if(!g)return;g.matches.forEach(mt=>mt.date=date);saveAll(D);toast('日期已更新');}

function calcSt(gn,g,tier){
  const ids=g.players;const st={};ids.forEach(id=>{st[id]={id,wins:0,losses:0,points:0}});
  g.matches.forEach(m=>{
    // 每赢一小局加1分（小分制）
    if(m.s1!==null&&m.s2!==null){
      if(st[m.p1])st[m.p1].points+=(m.s1||0);
      if(st[m.p2])st[m.p2].points+=(m.s2||0);
    }
    // 比赛胜负统计（大分）
    if(m.winner&&st[m.winner]){st[m.winner].wins++;}
    const l=m.p1===m.winner?m.p2:m.p1;
    if(m.winner&&l&&st[l])st[l].losses++;
  });
  return ids.map(id=>{const p=D.players.find(x=>x.id===id)||{};return{...st[id],name:p.name||'?',score:p.score||0}}).sort((a,b)=>b.points-a.points||b.wins-a.wins||a.losses-b.losses).map((s,i)=>{s.rank=i+1;return s});
}
function moveSubGroup(tier,fromGn,pid){
  const tg=document.querySelector(`[onchange="moveSubGroup('${tier}','${fromGn}','${pid}')"]`);if(!tg)return;
  const toGn=tg.value;if(!toGn)return;const m=D.matches[tier];if(!m||!m.groups)return;
  const fg=m.groups[fromGn],tg2=m.groups[toGn];if(!fg||!tg2)return;
  fg.players=fg.players.filter(x=>x!==pid);
  fg.matches=fg.matches.filter(x=>x.p1!==pid&&x.p2!==pid);
  tg2.players.push(pid);
  const oldM=tg2.matches.filter(x=>x.p1!==pid&&x.p2!==pid);
  const newM=[];tg2.players.forEach(q=>{if(q!==pid)newM.push({id:'g_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),p1:pid,p2:q,s1:null,s2:null,winner:null,bo:3,date:tg2.matches[0]?tg2.matches[0].date:''})});
  tg2.matches=[...oldM,...newM];
  m.groupConfirmed=false;
  saveAll(D);showAP('schedule');toast(`已移至${toGn}组，赛程已同步更新`);
}

// Build player options dropdown for knockout participant selection
function koPlayerSelect(tier,koId,slot){
  const m=D.matches[tier];if(!m||!m.groups)return'';
  // Gather all players in this tier's groups
  const allP=[];const seen=new Set();
  Object.entries(m.groups).forEach(([gn,g])=>{
    g.players.forEach(pid=>{if(!seen.has(pid)){seen.add(pid);const p=D.players.find(x=>x.id===pid);if(p)allP.push(p);}});
  });
  allP.sort((a,b)=>b.score-a.score);
  let s=`<select class="ko-select" onchange="setKoPlayer('${tier}','${koId}','${slot}',this.value)" title="选择选手"><option value="">--待定--</option>`;
  allP.forEach(p=>{s+=`<option value="${p.id}">${esc(p.name)} (${p.score})</option>`;});
  s+=`</select>`;
  return s;
}
function setKoPlayer(tier,koId,slot,pid){
  const m=D.matches[tier];if(!m)return;
  const ko=m.knockout.find(k=>k.id===koId);if(!ko)return;
  if(slot==='p1')ko.p1=pid||null;else ko.p2=pid||null;
  // Reset winner if participants changed
  if(ko.winner&&ko.winner!==ko.p1&&ko.winner!==ko.p2)ko.winner=null;
  saveAll(D);showAP('schedule');toast('✅ 已更新');
}

function bkDOM(m,sf1,sf2,fin,tp,qf,lb){

      <div class="p1${w===p1?' w':''}">${pn(p1)}</div>
      <div class="sc">${s1}:${s2}</div>
      <div class="p2${w===p2?' w':''}">${pn(p2)}</div></div>`;
  };
  const champ=fin&&fin.winner?pn(fin.winner):'待定';

function autoTeams(){
  const avail=D.players.filter(p=>p.event!=='individual'&&!p.teamId);
  if(avail.length<2){toast('至少需要2名可组队选手');return}
  // 分组池
  const pool={t1:avail.filter(p=>p.group==='t1'),t2:avail.filter(p=>p.group==='t2'),t3:avail.filter(p=>p.group==='t3')};
  // 按总分排序
  Object.values(pool).forEach(a=>a.sort((a,b)=>b.score-a.score));
  const totalAvail=avail.length;
  const teamSize=totalAvail<=6?2:totalAvail<=9?3:Math.min(4,Math.ceil(totalAvail/3));
  const numTeams=Math.max(2,Math.floor(totalAvail/teamSize));
  D.teams=[];
  // 先跨组搭配：每个队伍尽量从不同组取人
  const used=new Set();
  for(let i=0;i<numTeams;i++){
    const members=[];
    // 轮流从t1,t2,t3取人
    ['t1','t2','t3'].forEach(tier=>{
      const p=pool[tier].find(p=>!used.has(p.id));
      if(p){members.push(p.id);used.add(p.id)}
    });
    if(members.length>=2){
      const tid='t_'+Date.now().toString(36)+i;
      D.teams.push({id:tid,name:'战队'+(i+1),members});
      members.forEach(mid=>{const p=D.players.find(x=>x.id===mid);if(p)p.teamId=tid});
    }
  }
  // 剩余未分配的加入已有队伍（平衡分数）
  const leftovers=avail.filter(p=>!used.has(p.id));
  leftovers.forEach(p=>{
    // 找到总分最低的队伍加入
    let minTeam=null,minScore=Infinity;
    D.teams.forEach(t=>{
      const ms=t.members.map(mid=>D.players.find(x=>x.id===mid)).filter(Boolean);
      const ts=ms.reduce((s,m)=>s+(m.score||0),0);
      if(ts<minScore){minScore=ts;minTeam=t}
    });
    if(minTeam){minTeam.members.push(p.id);p.teamId=minTeam.id}
  });
  if(D.teams.length<2){toast('组队失败，请手动创建');return}
  saveAll(D);showAP('teams');toast(`✅ 已生成${D.teams.length}支队伍（每队${teamSize}人左右）`);
}
function genTeamSched(){
  if(D.teams.length<3)return;const ng=Math.min(2,Math.ceil(D.teams.length/3));
  const gs={};for(let i=0;i<ng;i++)gs[String.fromCharCode(65+i)]={teamIds:[],matches:[]};
  [...D.teams].sort(()=>Math.random()-.5).forEach((t,i)=>gs[String.fromCharCode(65+(i%ng))].teamIds.push(t.id));
  const today=new Date();const hh=['14:00','15:30','16:00','17:30','19:00','20:00','20:30'];
  const dd=(i)=>{const d=new Date(today);d.setDate(d.getDate()+i);return(d.getMonth()+1)+'月'+d.getDate()+'日 '+hh[i]||'14:00';};
  Object.values(gs).forEach((g,gi)=>{for(let i=0;i<g.teamIds.length;i++)for(let j=i+1;j<g.teamIds.length;j++)g.matches.push({id:'tm_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),t1:g.teamIds[i],t2:g.teamIds[j],s1:null,s2:null,winner:null,bo:3,date:dd(gi)});});
  D.teamM={groups:gs,knockout:[{id:'tko_sf1',r:'semifinal',bo:5,t1:null,t2:null,s1:null,s2:null,winner:null,date:dd(5),label:'A1 vs B2'},{id:'tko_sf2',r:'semifinal',bo:5,t1:null,t2:null,s1:null,s2:null,winner:null,date:dd(5),label:'B1 vs A2'},{id:'tko_3rd',r:'third',bo:5,t1:null,t2:null,s1:null,s2:null,winner:null,date:dd(6),label:'季军赛'},{id:'tko_fin',r:'final',bo:7,t1:null,t2:null,s1:null,s2:null,winner:null,date:dd(6),label:'决赛'},]};
}

function calcTSt(gn,g){const ids=g.teamIds;const st={};ids.forEach(id=>{st[id]={id,wins:0,losses:0,points:0}});g.matches.forEach(m=>{if(m.s1!==null&&m.s2!==null){if(st[m.t1])st[m.t1].points+=(m.s1||0);if(st[m.t2])st[m.t2].points+=(m.s2||0);}if(m.winner&&st[m.winner]){st[m.winner].wins++;const l=m.t1===m.winner?m.t2:m.t1;if(st[l])st[l].losses++;}});return ids.map(id=>{const t=D.teams.find(x=>x.id===id)||{};return{...st[id],name:t.name||'?'}}).sort((a,b)=>b.points-a.points||b.wins-a.wins).map((s,i)=>{s.rank=i+1;return s});}
function tMrow(m,t1,t2){if(!t1||!t2)return'';const w=m.winner?`→ ${esc((D.teams.find(x=>x.id===m.winner)||{}).name||'?')} 胜`:'';return`<div class="m-row"><span style="flex:1;text-align:right">${esc(t1.name)}</span><input value="${fmt(m.s1)}" onchange="upTM('${m.id}','s1',this.value)"><span class="vs">:</span><input value="${fmt(m.s2)}" onchange="upTM('${m.id}','s2',this.value)"><span style="flex:1">${esc(t2.name)}</span><span style="font-size:.65em;color:var(--text2)">BO${m.bo}</span><span style="font-size:.68em;color:var(--pri)">${w}</span><input class="date-inp" value="${m.date||''}" onchange="upTMDate('${m.id}',this.value)"><button class="btn btn-g btn-xs" onclick="rstTM('${m.id}')">重置</button></div>`;}
function tKorow(ko){const t1=D.teams.find(x=>x.id===ko.t1),t2=D.teams.find(x=>x.id===ko.t2);const rn={semifinal:'半决赛',third:'季军赛',final:'🏆 决赛'}[ko.r]||ko.r;const w=ko.winner?`→ ${esc((D.teams.find(x=>x.id===ko.winner)||{}).name||'?')} 胜`:'';return`<div class="m-row" style="border-left:2px solid var(--t3);margin-bottom:3px"><b style="min-width:50px;color:var(--t3);font-size:.7em">${rn}</b><span style="flex:1;text-align:right">${t1?esc(t1.name):'<i style="color:var(--text2)">待定</i>'}</span><input value="${fmt(ko.s1)}" onchange="upTKo('${ko.id}','s1',this.value)"><span class="vs">:</span><input value="${fmt(ko.s2)}" onchange="upTKo('${ko.id}','s2',this.value)"><span style="flex:1">${t2?esc(t2.name):'<i style="color:var(--text2)">待定</i>'}</span><span style="font-size:.65em;color:var(--text2)">BO${ko.bo}</span><span style="font-size:.68em;color:var(--pri)">${w}</span><input class="date-inp" value="${ko.date||''}" onchange="upTKoDate('${ko.id}',this.value)"><button class="btn btn-g btn-xs" onclick="rstTKo('${ko.id}')">重置</button></div>`;}

  let h='<div class="g-grid" style="margin-bottom:12px">';Object.entries(D.teamM.groups).forEach(([gn,g])=>{const st=calcTSt(gn,g);h+=`<div class="g-card"><div class="g-hd">${gn}组</div><table><thead><tr><th>队伍</th><th>积分</th><th>胜/负</th></tr></thead><tbody>`;st.forEach(s=>h+=`<tr class="${s.rank<=2?'q':''}"><td>${esc(s.name)}</td><td>${s.points}</td><td>${s.wins}/${s.losses}</td></tr>`);h+=`</tbody></table></div>`;});h+=`</div>`;

  const tmb=(mt,rl,bo)=>{const t1=mt?mt.t1:null,t2=mt?mt.t2:null,w=mt?mt.winner:null,s1=mt&&mt.s1!==null?mt.s1:'-',s2=mt&&mt.s2!==null?mt.s2:'-';return`<div class="bk-m${w?' won':''}"><div class="rd">${rl} · BO${bo}</div><div class="p1${w===t1?' w':''}">${tpn(t1)}</div><div class="sc">${s1}:${s2}</div><div class="p2${w===t2?' w':''}">${tpn(t2)}</div></div>`;};

  h+=`<div class="card animate-in"><div class="card-trim"></div><h2>🏆 3V3 淘汰赛</h2><div class="bk-wrap"><div class="bk-row"><div class="bk-col"><div class="bk-ttl">半决赛 (BO5)</div>${tmb(sf1,'A1 vs B2',5)}<div style="height:16px"></div>${tmb(sf2,'B1 vs A2',5)}</div><div class="bk-arr">▶</div><div class="bk-col"><div class="bk-ttl">决赛 (BO7)</div>${tmb(fin,'决赛',7)}</div><div class="bk-arr">▶</div><div class="bk-col"><div class="bk-ttl">季军赛 (BO5)</div>${tmb(tp,'季军赛',5)}</div><div class="rs-card"><div>🥇 <b>冠军</b>: ${champ}</div><div>🥈 <b>亚军</b>: ${runner}</div><div>🥉 <b>季军</b>: ${tp&&tp.winner?tpn(tp.winner):'待定'}</div></div></div></div></div>`;return h;}

function aw(m,bo){if(m.s1===null||m.s2===null){m.winner=null;return}const n=Math.ceil(bo/2);if(m.s1>=n&&m.s1>m.s2)m.winner=m.p1||m.t1;else if(m.s2>=n&&m.s2>m.s1)m.winner=m.p2||m.t2;else m.winner=null}

function upTM(mid,f,v){let fd=null;Object.values(D.teamM.groups).forEach(g=>{const x=g.matches.find(y=>y.id===mid);if(x)fd=x});if(!fd)return;fd[f]=v===''?null:parseInt(v);aw(fd,fd.bo);advTK();saveAll(D);showAP('schedule')}

// ==================== KNOCKOUT ADVANCEMENT (ROBUST) ====================
function advKnock(tier){
  const m=D.matches[tier];
  if(!m||!m.groups||m.knockout.length===0)return;
  if(!m.groupConfirmed)return;
  if(m.format==='direct')return;
  // Backward compat: infer advPerGroup if missing
  const ap=m.advPerGroup||(m.format==='quarter'?2:1);

  // Get standings: top 1 and top 2 per group
  const gw={}, gTop2={};
  Object.entries(m.groups).forEach(([gn,g])=>{
    const st=calcSt(gn,g,tier);
    if(st.length>0)gw[gn]=st[0].id;
    gTop2[gn]=st.slice(0,2).map(s=>s.id);
  });
  const keys=Object.keys(gw).sort();

  if(m.format==='semifinal'){
    const needSemis=m.numGroups>2||(m.numGroups===2&&ap===2);
    if(!needSemis&&keys.length>=2){
      // 2 groups, 1 per group → direct final
      const fin=m.knockout.find(k=>k.r==='final');
      if(fin&&(!fin.s1||fin.s1===null||!fin.p1)){fin.p1=gw[keys[0]]||null;fin.p2=gw[keys[1]]||null}
    }else if(needSemis&&keys.length>=2){
      // 4 groups → cross semis: A1-C2, B1-D1 (or A1-D1, B1-C1)
      // 2 groups top2 → cross semis: A1-B2, B1-A2
      const sf1=m.knockout.find(k=>k.r==='semifinal'&&k.label.includes('半决赛1'));
      const sf2=m.knockout.find(k=>k.r==='semifinal'&&k.label.includes('半决赛2'));
      const tp=m.knockout.find(k=>k.r==='third'),fin=m.knockout.find(k=>k.r==='final');

      if(m.numGroups>=4&&keys.length>=4){
        // 4 groups: A1 vs D1, B1 vs C1 (cross bracket)
        if(sf1&&(!sf1.s1||sf1.s1===null||!sf1.p1)){sf1.p1=gw[keys[0]]||null;sf1.p2=gw[keys[3]]||null}
        if(sf2&&(!sf2.s1||sf2.s1===null||!sf2.p1)){sf2.p1=gw[keys[1]]||null;sf2.p2=gw[keys[2]]||null}
      }else if(m.numGroups===2&&ap===2&&keys.length>=2){
        // 2 groups, top 2 each: A1 vs B2, B1 vs A2
        const a2=gTop2[keys[0]]?gTop2[keys[0]][1]:null;
        const b2=gTop2[keys[1]]?gTop2[keys[1]][1]:null;
        if(sf1&&(!sf1.s1||sf1.s1===null||!sf1.p1)){sf1.p1=gw[keys[0]]||null;sf1.p2=b2}
        if(sf2&&(!sf2.s1||sf2.s1===null||!sf2.p1)){sf2.p1=gw[keys[1]]||null;sf2.p2=a2}
      }else{
        // Fallback: populate semis with available winners
        if(sf1&&keys.length>=2&&(!sf1.s1||sf1.s1===null||!sf1.p1)){sf1.p1=gw[keys[0]]||null;sf1.p2=gw[keys[keys.length-1]]||null}
        if(sf2&&keys.length>=3&&(!sf2.s1||sf2.s1===null||!sf2.p1)){sf2.p1=gw[keys[1]]||null;sf2.p2=gw[keys.length>3?keys[keys.length-2]:keys[1]]||null}
      }
      // Propagate semifinal winners to final/3rd
      if(sf1&&sf1.winner&&sf2&&sf2.winner){
        if(fin){fin.p1=sf1.winner;fin.p2=sf2.winner}
        if(tp){tp.p1=sf1.winner===sf1.p1?sf1.p2:sf1.p1;tp.p2=sf2.winner===sf2.p1?sf2.p2:sf2.p1}
      }
    }
  }else{// quarter: 4 groups, top 2 each → 8 quarterfinalists
    const qfs=m.knockout.filter(k=>k.r==='quarter');
    const groups=Object.keys(m.groups).sort();
    if(groups.length>=4&&qfs.length>=4){
      const[A,B,C,D]=groups;
      if(gTop2[A]&&gTop2[A].length>=2&&gTop2[B]&&gTop2[B].length>=2&&gTop2[C]&&gTop2[C].length>=2&&gTop2[D]&&gTop2[D].length>=2){
        // Cross-bracket: A1-D2, B1-C2, C1-B2, D1-A2
        if(!qfs[0].p1||qfs[0].s1===null){qfs[0].p1=gTop2[A][0];qfs[0].p2=gTop2[D][1]}
        if(!qfs[1].p1||qfs[1].s1===null){qfs[1].p1=gTop2[B][0];qfs[1].p2=gTop2[C][1]}
        if(!qfs[2].p1||qfs[2].s1===null){qfs[2].p1=gTop2[C][0];qfs[2].p2=gTop2[B][1]}
        if(!qfs[3].p1||qfs[3].s1===null){qfs[3].p1=gTop2[D][0];qfs[3].p2=gTop2[A][1]}
      }
    }
    // QF winners → SF
    const sf1=m.knockout.find(k=>k.r==='semifinal'&&k.label.includes('半决赛1'));
    const sf2=m.knockout.find(k=>k.r==='semifinal'&&k.label.includes('半决赛2'));
    if(qfs.length>=4&&sf1&&sf2){
      if(qfs[0].winner&&qfs[3].winner){sf1.p1=qfs[0].winner;sf1.p2=qfs[3].winner}
      if(qfs[1].winner&&qfs[2].winner){sf2.p1=qfs[1].winner;sf2.p2=qfs[2].winner}
    }
    // SF winners → Final + 3rd
    const tp=m.knockout.find(k=>k.r==='third'),fin=m.knockout.find(k=>k.r==='final');
    if(sf1&&sf1.winner&&sf2&&sf2.winner){
      if(fin){fin.p1=sf1.winner;fin.p2=sf2.winner}
      if(tp){tp.p1=sf1.winner===sf1.p1?sf1.p2:sf1.p1;tp.p2=sf2.winner===sf2.p1?sf2.p2:sf2.p1}
    }
  }
}

function advTK(){
  if(!D.teamM.groups)return;
  const gt={};Object.entries(D.teamM.groups).forEach(([gn,g])=>{
    const st=calcTSt(gn,g);if(st.length>=2)gt[gn]=[st[0].id,st[1].id];
  });
  const sf1=D.teamM.knockout.find(k=>k.r==='semifinal'&&k.label.includes('A1'));
  const sf2=D.teamM.knockout.find(k=>k.r==='semifinal'&&k.label.includes('B1'));
  const tp=D.teamM.knockout.find(k=>k.r==='third'),fin=D.teamM.knockout.find(k=>k.r==='final');
  if(sf1&&gt['A']&&gt['B']){sf1.t1=gt['A'][0];sf1.t2=gt['B'][1]}
  if(sf2&&gt['B']&&gt['A']){sf2.t1=gt['B'][0];sf2.t2=gt['A'][1]}
  if(sf1&&sf1.winner&&sf2&&sf2.winner){if(fin){fin.t1=sf1.winner;fin.t2=sf2.winner}if(tp){tp.t1=sf1.winner===sf1.t1?sf1.t2:sf1.t1;tp.t2=sf2.winner===sf2.t1?sf2.t2:sf2.t1}}
}

function pSchedule(user,p){
  if(!p||!p.group)return`<div class="tb"><h2>📅 我的赛程</h2></div><div class="card"><p style="text-align:center;color:var(--text2);padding:48px">尚未编排组别</p></div>`;
  const m=D.matches[p.group];const lb=TIERS[p.group];
  if(!m.groups||Object.keys(m.groups).length===0)return`<div class="tb"><h2>📅 我的赛程</h2></div><div class="card"><p style="text-align:center;color:var(--text2);padding:48px">赛程未生成</p></div>`;
  let h=`<div class="tb"><h2>📅 我的赛程</h2><span class="badge ${TC[p.group]}">${lb}</span></div>`;
  let found=false;
  Object.entries(m.groups).forEach(([gn,g])=>{
    if(!g.players.includes(p.id))return;found=true;
    const st=calcSt(gn,g,p.group);
    h+=`<div class="card animate-in"><div class="card-trim"></div><h2>${gn}组 · ${lb} (BO3)</h2>
      <table><thead><tr><th>#</th><th>侠客</th><th>分</th><th>胜</th><th>负</th><th>积分</th></tr></thead><tbody>`;
    st.forEach(s=>h+=`<tr class="${s.id===p.id?'q':''}"><td>${s.rank}</td><td>${esc(s.name)}${s.id===p.id?' ⬅':''}</td><td>${s.score}</td><td>${s.wins}</td><td>${s.losses}</td><td><b>${s.points}</b></td></tr>`);
    h+=`</tbody></table><h3>我的对阵</h3>`;
    g.matches.forEach(m2=>{if(m2.p1!==p.id&&m2.p2!==p.id)return;const p1=D.players.find(x=>x.id===m2.p1),p2=D.players.find(x=>x.id===m2.p2);h+=`<div class="m-row"><span style="flex:1;text-align:right">${esc(p1?p1.name:'?')}</span><b>${fmt(m2.s1)}:${fmt(m2.s2)}</b><span style="flex:1">${esc(p2?p2.name:'?')}</span><span style="font-size:.65em;color:var(--text2)">BO${m2.bo}</span>${m2.date?`<span style="font-size:.65em;color:var(--text2)">📅${m2.date}</span>`:''}${m2.winner?`<span style="font-size:.68em;color:var(--pri)">→ ${esc((D.players.find(x=>x.id===m2.winner)||{}).name||'?')} 胜</span>`:''}</div>`;});
    h+=`</div>`;
  });
  if(!found)h+='<div class="card"><p style="text-align:center;color:var(--text2);padding:32px">你不在当前任何小组中</p></div>';
  return h;
}
function pBracket(p){const tier=p&&p.group?p.group:'t1';const m=D.matches[tier];const lb=TIERS[tier];if(!m.groups||Object.keys(m.groups).length===0)return`<div class="tb"><h2>🏆 晋级图</h2></div><div class="card"><p style="text-align:center;color:var(--text2);padding:48px">暂无数据</p></div>`;let h=`<div class="tb"><h2>🏆 晋级图</h2><span class="badge ${TC[tier]}">${lb}</span></div><div class="g-grid" style="margin-bottom:12px">`;Object.entries(m.groups).forEach(([gn,g])=>{const st=calcSt(gn,g,tier);h+=`<div class="g-card ${tier}"><div class="g-hd">${gn}组</div><table><thead><tr><th>侠客</th><th>积分</th><th>胜/负</th></tr></thead><tbody>`;st.forEach(s=>h+=`<tr class="${s.rank<=getAdvCount(m)?'q':''}"><td>${esc(s.name)}</td><td>${s.points}</td><td>${s.wins}/${s.losses}</td></tr>`);h+=`</tbody></table></div>`;});h+=`</div>`;if(!m.groupConfirmed){h+=`<div class="card"><p style="text-align:center;color:var(--text2);padding:32px">🔒 小组赛尚未锁定，淘汰赛对阵待管理员确认后公布</p></div>`;}else if(m.knockout.length>0){const sf1=m.knockout.find(k=>k.r==='semifinal'&&k.label.includes('半决赛1'));const sf2=m.knockout.find(k=>k.r==='semifinal'&&k.label.includes('半决赛2'));const tp=m.knockout.find(k=>k.r==='third'),fin=m.knockout.find(k=>k.r==='final');const qf=m.knockout.filter(k=>k.r==='quarter');h+=bkDOM(m,sf1,sf2,fin,tp,qf,lb);}else{h+=`<div class="card"><h2>🏆 ${lb} · 冠军</h2><p style="font-size:1.2em;text-align:center;color:var(--pri);padding:20px">${(()=>{const allSt=[];Object.entries(m.groups).forEach(([gn,g])=>{const st=calcSt(gn,g,tier);allSt.push(...st)});allSt.sort((a,b)=>b.points-a.points||b.wins-a.wins);return allSt[0]?esc(allSt[0].name):'待定';})()}</p></div>`;}return h;}

// ==================== TEST DATA GENERATOR ====================
function generateTestData(){
  if(D.players.length>0&&!confirm('当前已有'+D.players.length+'名选手。生成测试数据将追加20人，确定继续？'))return;
  const names=[
    '燕云飞','江无浪','温无缺','寒香寻','柳青衣','楚清泉','千夜','柴荣',
    '田英','张淮深','东阙公子','清河公主','李逍遥','赵客','吴钩','霜雪',
    '风清扬','独孤剑','叶孤城','西门吹雪','花无缺','小鱼儿','楚留香','陆小凤',
    '杨过','令狐冲','张无忌','郭靖','黄蓉','小龙女'
  ];
  const events=['both','both','both','individual','individual','individual','team','team','both','both'];
  const startCount=D.players.length;
  for(let i=0;i<20;i++){
    const nm=names[i]||('侠客'+(i+1));
    const score=800+Math.floor(Math.random()*1200);
    const wr=40+Math.floor(Math.random()*45);
    const uid='test_'+Date.now().toString(36)+'_'+i;
    // Create user account
    if(!D.users.find(u=>u.username===('test_'+nm))){
      D.users.push({id:uid,username:'test_'+nm,password:'test123',role:'player',name:nm,score,winrate:wr,event:events[i%events.length],contact:'wx_'+nm,note:'测试选手',registeredAt:new Date().toISOString()});
    }
    D.players.push({id:uid,name:nm,score,winrate:wr,event:events[i%events.length],group:null,teamId:null,contact:'wx_'+nm,note:'测试选手'});
  }
  // Auto assign tiers
  const indiv=D.players.filter(p=>p.event!=='team');
  const sorted=[...indiv].sort((a,b)=>b.score-a.score||b.winrate-a.winrate);
  const total=sorted.length,s1=Math.floor(total/3),s2=Math.floor(total*2/3);
  sorted.forEach((p,i)=>{
    if(i<s1)p.group='t1';else if(i<s2)p.group='t2';else p.group='t3';
  });
  // Auto generate schedules for all tiers
  let genCount=0;
  ['t1','t2','t3'].forEach(tier=>{
    const ps=D.players.filter(p=>p.group===tier&&p.event!=='team');
    if(ps.length>=3){const r=adaptiveSchedule(ps);if(r){D.matches[tier]=r;genCount++;}}
  });
  // Auto-create 3V3 teams using new adaptive logic
  autoTeams();
  if(D.teams.length>=3)genTeamSched();
  saveAll(D);
  toast('✅ 已生成20名测试选手！天罡'+sorted.filter(p=>p.group==='t1').length+'·地煞'+sorted.filter(p=>p.group==='t2').length+'·人杰'+sorted.filter(p=>p.group==='t3').length+'，赛程已自动生成');
  showAP('groups');
}

function exportCSV(){if(D.players.length===0){toast('无数据');return}const hdr='角色名,论剑分,胜率,参赛项目,分组,联系方式,备注';const rows=D.players.map(p=>[p.name,p.score,p.winrate+'%',p.event,TIERS[p.group]||'未分组',p.contact||'',p.note||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));const blob=new Blob(['﻿'+hdr+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='论剑问道报名表.csv';a.click();}
function importCSV(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const lines=ev.target.result.split('\n').filter(l=>l.trim());if(lines.length<2){toast('格式错误');return}let n=0;for(let i=1;i<lines.length;i++){const cols=pCSV(lines[i]);if(cols.length<2||!cols[0])continue;const name=cols[0].trim();if(D.players.find(p=>p.name===name))continue;const score=parseInt(cols[1])||0,wr=parseInt(cols[2])||0;let evt='both';if(cols[3]&&cols[3].includes('仅个人'))evt='individual';else if(cols[3]&&cols[3].includes('仅3V3'))evt='team';D.players.push({id:'imp_'+Date.now().toString(36)+n,name,score,winrate:wr,event:evt,contact:(cols[5]||'').trim(),note:(cols[6]||'').trim(),group:null,teamId:null});n++;}saveAll(D);showAP('players');toast(`导入${n}人`);};r.readAsText(f,'UTF-8');e.target.value='';}
function pCSV(line){const r=[];let cur='',q=false;for(const ch of line){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(cur);cur=''}else cur+=ch}r.push(cur);return r;}

// ==================== VIDEO INTRO ====================
function playVideoIntro(){
  const intro=document.getElementById('videoIntro');
  const video=document.getElementById('introVideo');
  if(!intro||!video)return;
  video.currentTime=0;
  video.play().then(()=>{
    // 播放4秒后开始淡出
    setTimeout(()=>{intro.classList.add('fadeout')},3800);
    // 5.5秒后完全移除
    setTimeout(()=>{intro.classList.add('done');captureVideoFrames(video)},5500);
  }).catch(()=>{
    // 如果自动播放失败（某些浏览器限制），直接显示登录页
    intro.classList.add('done');
  });
}

// 从视频中截取关键帧做装饰素材
let _vidFrames=[];
function captureVideoFrames(video){
  if(!video||video.readyState<2)return;
  const canvas=document.createElement('canvas');
  canvas.width=320;canvas.height=180;
  const ctx=canvas.getContext('2d');
  const timestamps=[0.5,2,3.5,5,7]; // 不同时间点截图
  timestamps.forEach((t,i)=>{
    try{
      video.currentTime=t;
      // 等seek完成后截图
      const onSeeked=()=>{
        ctx.drawImage(video,0,0,320,180);
        _vidFrames.push(canvas.toDataURL('image/jpeg',.7));
        if(_vidFrames.length>=timestamps.length)renderVideoFrames();
        video.removeEventListener('seeked',onSeeked);
      };
      video.addEventListener('seeked',onSeeked);
    }catch(e){}
  });
}
function renderVideoFrames(){
  const container=document.getElementById('videoFrames');
  if(!container||_vidFrames.length<3)return;
  container.innerHTML=_vidFrames.slice(0,3).map((url,i)=>
    `<div class="vid-frame f${i+1}"><img src="${url}" alt="燕云十六声"></div>`
  ).join('');
}

// 激活视频背景（登录后）
function startAppVideoBg(){
  const v=document.getElementById('appVideoBg');
  const f=document.getElementById('videoFrames');
  if(v){v.classList.add('on');v.play().catch(()=>{})}
  if(f)f.classList.add('on');
}
